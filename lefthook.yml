pre-commit:
  # skip if here are any unstaged changes
  skip:
    - run: "! git diff --quiet"
  commands:
    fmt:
      run: cargo xtask fmt
      stage_fixed: true
    fix-lints:
      run: cargo xtask clippy --fix --allow-dirty --allow-staged
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    test:
      run: cargo xtask test
    check-fmt:
      run: cargo xtask fmt --check
    check-clippy:
      run: cargo xtask clippy
